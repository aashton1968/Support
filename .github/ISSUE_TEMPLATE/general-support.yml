name: Support Request
description: Ask a question or request help using one of the apps.
title: "[Support]: "
labels: ["question"]

body:
  - type: dropdown
    id: app
    attributes:
      label: Which app is this related to?
      options:
        - Financial Sidekick
        - Medication Sidekick
        - Memory Sidekick
        - Other
    validations:
      required: true

  - type: textarea
    id: question
    attributes:
      label: How can we help?
      placeholder: Describe your question or issue.
    validations:
      required: true

labels:
  - question
  - app:financial-sidekick: if(app == "Financial Sidekick")
  - app:medication-sidekick: if(app == "Medication Sidekick")
  - app:memory-sidekick: if(app == "Memory Sidekick")
  - app:other: if(app == "Other")
