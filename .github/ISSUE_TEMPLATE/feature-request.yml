name: Feature Request
description: Suggest a new feature or improvement.
title: "[Feature]: "
labels: ["enhancement"]

body:
  - type: dropdown
    id: app
    attributes:
      label: Which app is this request for?
      options:
        - Financial Sidekick
        - Medication Sidekick
        - Memory Sidekick
        - Other
    validations:
      required: true

  - type: textarea
    id: feature
    attributes:
      label: What would you like to see?
      placeholder: Describe the feature or improvement.
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: Why is this useful?
      placeholder: Explain how this improves the app or user experience.
    validations:
      required: false

labels:
  - enhancement
  - app:financial-sidekick: if(app == "Financial Sidekick")
  - app:medication-sidekick: if(app == "Medication Sidekick")
  - app:memory-sidekick: if(app == "Memory Sidekick")
  - app:other: if(app == "Other")
